<!DOCTYPE html>
<html>
<head>
    <title>Network Monitoring Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            color: #e8e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }
        .status-badge {
            background: rgba(0, 255, 100, 0.1);
            color: #00ff64;
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(0, 255, 100, 0.2);
            font-size: 0.9rem;
        }
        .status-badge.offline {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4444;
            border-color: rgba(255, 0, 0, 0.2);
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .stat-card .label {
            color: #8888aa;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 10px 0;
        }
        .stat-card .value.good { color: #00ff64; }
        .stat-card .value.warning { color: #ffd700; }
        .stat-card .value.danger { color: #ff4444; }
        .stat-card .unit { font-size: 1rem; color: #8888aa; }
        
        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .chart-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .chart-container h3 {
            color: #8888aa;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 15px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .charts-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; gap: 15px; }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🌐 Network Monitoring Dashboard</h1>
            <div>
                <span class="status-badge" id="statusBadge">● Online</span>
                <span style="color:#8888aa;margin-left:15px;" id="lastUpdate">Last update: -</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">CPU Usage</div>
                <div class="value good" id="cpuValue">0%</div>
            </div>
            <div class="stat-card">
                <div class="label">Memory Usage</div>
                <div class="value good" id="memoryValue">0%</div>
            </div>
            <div class="stat-card">
                <div class="label">Latency</div>
                <div class="value good" id="latencyValue">0ms</div>
            </div>
            <div class="stat-card">
                <div class="label">Packet Loss</div>
                <div class="value good" id="packetLossValue">0%</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-container">
                <h3>📊 CPU & Memory Usage</h3>
                <div id="cpuChart"></div>
            </div>
            <div class="chart-container">
                <h3>📊 Latency & Packet Loss</h3>
                <div id="latencyChart"></div>
            </div>
        </div>
    </div>

    <script>
        // Update current metrics
        async function updateMetrics() {
            try {
                const response = await fetch('/api/current');
                const data = await response.json();
                
                document.getElementById('cpuValue').textContent = data.cpu_usage + '%';
                document.getElementById('memoryValue').textContent = data.memory_usage + '%';
                document.getElementById('latencyValue').textContent = (data.latency ? data.latency.toFixed(1) : 'N/A') + 'ms';
                document.getElementById('packetLossValue').textContent = data.packet_loss + '%';
                document.getElementById('lastUpdate').textContent = 'Last update: ' + new Date().toLocaleTimeString();
                
                // Update colors
                updateColor('cpuValue', data.cpu_usage, 70, 80);
                updateColor('memoryValue', data.memory_usage, 70, 80);
                updateColor('latencyValue', data.latency || 0, 100, 200);
                updateColor('packetLossValue', data.packet_loss, 5, 10);
                
            } catch (e) {
                console.error('Error fetching metrics:', e);
            }
        }

        function updateColor(id, value, warning, danger) {
            const el = document.getElementById(id);
            if (value > danger) el.className = 'value danger';
            else if (value > warning) el.className = 'value warning';
            else el.className = 'value good';
        }

        // Draw charts
        async function drawCharts() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                
                const timestamps = data.map(d => d.timestamp.slice(11, 19));
                
                // CPU Chart
                const cpuTrace = {
                    x: timestamps,
                    y: data.map(d => d.cpu_usage),
                    type: 'scatter',
                    mode: 'lines+markers',
                    name: 'CPU %',
                    line: { color: '#00d2ff', width: 2 },
                    marker: { color: '#00d2ff' }
                };
                const memoryTrace = {
                    x: timestamps,
                    y: data.map(d => d.memory_usage),
                    type: 'scatter',
                    mode: 'lines+markers',
                    name: 'Memory %',
                    line: { color: '#ffd700', width: 2 },
                    marker: { color: '#ffd700' }
                };
                
                Plotly.newPlot('cpuChart', [cpuTrace, memoryTrace], {
                    paper_bgcolor: 'transparent',
                    plot_bgcolor: 'transparent',
                    font: { color: '#e8e8f0' },
                    margin: { t: 20, l: 50, r: 20, b: 40 },
                    legend: { orientation: 'h' }
                });

                // Latency Chart
                const latencyTrace = {
                    x: timestamps,
                    y: data.map(d => d.latency || 0),
                    type: 'scatter',
                    mode: 'lines+markers',
                    name: 'Latency (ms)',
                    line: { color: '#ff6b6b', width: 2 },
                    marker: { color: '#ff6b6b' }
                };
                
                Plotly.newPlot('latencyChart', [latencyTrace], {
                    paper_bgcolor: 'transparent',
                    plot_bgcolor: 'transparent',
                    font: { color: '#e8e8f0' },
                    margin: { t: 20, l: 50, r: 20, b: 40 }
                });
            } catch (e) {
                console.error('Error drawing charts:', e);
            }
        }

        // Initial load
        updateMetrics();
        drawCharts();
        
        // Update every 10 seconds
        setInterval(updateMetrics, 10000);
        setInterval(drawCharts, 30000);
    </script>
</body>
</html>
